services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cafe_andino_web
    depends_on:
      db:
        condition: service_healthy
    environment:
      FLASK_APP: run.py
      SECRET_KEY: ${SECRET_KEY:-change-this-secret-key}
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-cafe_andino}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@cafeandino.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-this-admin-password}
      ADMIN_FULL_NAME: ${ADMIN_FULL_NAME:-Administrador Cafe Andino}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      SESSION_COOKIE_SAMESITE: ${SESSION_COOKIE_SAMESITE:-Lax}
      MAX_CONTENT_LENGTH: ${MAX_CONTENT_LENGTH:-16777216}
      CSV_UPLOAD_FOLDER: /app/tmp/uploads
    command: >
      sh -c "flask db upgrade
      && flask create-admin
      && gunicorn --bind 0.0.0.0:5000 --workers 3 --threads 2 --timeout 120 run:app"
    ports:
      - "${WEB_PORT:-5000}:5000"
    volumes:
      - uploads:/app/tmp/uploads
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: cafe_andino_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cafe_andino}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  uploads:
